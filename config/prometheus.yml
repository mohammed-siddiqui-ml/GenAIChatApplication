global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'knowledge-platform'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend API metrics
  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          environment: 'production'

  # Celery worker metrics (if exposed)
  - job_name: 'celery'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['celery_worker:8000']
        labels:
          service: 'celery'
          environment: 'production'

  # PostgreSQL exporter (if added)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'
          environment: 'production'

  # Redis exporter (if added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'
          environment: 'production'
