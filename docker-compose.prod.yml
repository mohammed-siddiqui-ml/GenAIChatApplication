version: '3.8'

# Production Docker Compose Override
# This file extends docker-compose.yml for production deployments
# Use: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge
  monitoring_network:
    driver: bridge

services:
  # PostgreSQL - Production Configuration
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Remove port mapping for production (internal only)
    ports: []

  # Redis - Production Configuration
  redis:
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports: []

  # MinIO - Production Configuration
  minio:
    restart: always
    command: server /data --console-address ":9001"
    ports: []

  # FastAPI Backend - Production Configuration
  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=production
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
    # Remove volume mounts for production (code baked into image)
    volumes:
      - backend_logs:/app/logs
      - chroma_data:/app/chroma_db
    ports: []
    # Production command (no reload)
    command: uvicorn src.main:app_with_socketio --host 0.0.0.0 --port 8000 --workers 4

  # Celery Worker - Production Configuration
  celery_worker:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=production
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - celery_logs:/app/logs
      - chroma_data:/app/chroma_db
    # Production command with autoscaling
    command: celery -A src.celery_app worker --loglevel=info --concurrency=8 --autoscale=16,4

  # React Frontend - Production Configuration
  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: nginx
      args:
        - VITE_API_URL=${BACKEND_URL}
    volumes: []
    ports: []
    # Uses nginx from Dockerfile
    environment: []

  # Nginx - Production Configuration with SSL
  nginx:
    restart: always
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
      - ssl_certs:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"

  # Prometheus - Production Configuration
  prometheus:
    restart: always
    ports: []

  # Loki - Production Configuration
  loki:
    restart: always
    ports: []

  # Grafana - Production Configuration
  grafana:
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://yourdomain.com/monitoring}
      - GF_SERVER_DOMAIN=${DOMAIN:-yourdomain.com}
    ports: []

  # Promtail - Production Configuration
  promtail:
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  chroma_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  backend_logs:
    driver: local
  celery_logs:
    driver: local
  nginx_logs:
    driver: local
  ssl_certs:
    driver: local
