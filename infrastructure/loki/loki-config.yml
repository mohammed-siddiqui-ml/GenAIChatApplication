# Loki Configuration for GenAI Knowledge Retrieval System
# Log Aggregation and Storage Configuration
#
# This configuration defines:
# - Server settings for HTTP and gRPC
# - Storage configuration for log data
# - Retention and compaction policies
# - Ingestion limits and query settings

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

# Common configuration shared across components
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# Schema configuration for indexing and storage
schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# Ruler for alerting (optional - requires alertmanager)
ruler:
  alertmanager_url: http://localhost:9093
  enable_api: true
  enable_alertmanager_v2: true
  storage:
    type: local
    local:
      directory: /loki/rules

# Limits configuration to prevent abuse and manage resources
limits_config:
  # Reject logs older than 168 hours (7 days)
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  
  # Ingestion rate limits
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  
  # Query limits
  max_query_length: 721h  # 30 days
  max_query_parallelism: 32
  max_query_series: 500
  max_streams_per_user: 0  # No limit
  max_entries_limit_per_query: 5000
  
  # Per-stream limits
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 20MB
  
  # Retention configuration
  retention_period: 720h  # 30 days

# Chunk store configuration
chunk_store_config:
  max_look_back_period: 0s

# Table manager configuration (deprecated but still used with boltdb-shipper)
table_manager:
  retention_deletes_enabled: true
  retention_period: 720h  # 30 days

# Compactor configuration for cleaning up old data
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_cancel_period: 24h

# Query scheduler configuration
query_scheduler:
  max_outstanding_requests_per_tenant: 256

# Frontend worker configuration
frontend_worker:
  frontend_address: 127.0.0.1:9095
  parallelism: 10
  grpc_client_config:
    max_send_msg_size: 104857600  # 100MB

# Ingester configuration
ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  max_chunk_age: 1h
  chunk_encoding: snappy
  wal:
    enabled: true
    dir: /loki/wal
    replay_memory_ceiling: 1GB

# Querier configuration
querier:
  max_concurrent: 10
  query_ingesters_within: 3h

# Query range configuration
query_range:
  parallelise_shardable_queries: true
  cache_results: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# Analytics configuration
analytics:
  reporting_enabled: false
