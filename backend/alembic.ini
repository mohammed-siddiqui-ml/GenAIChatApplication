# Alembic Configuration File
# For more information see: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Prepend sys.path with the backend directory
prepend_sys_path = .

# Template file used to generate migration scripts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Separator for version locations
version_path_separator = os

# SQLAlchemy database URL
# This is overridden by the DATABASE_URL environment variable in env.py
# Note: Alembic uses psycopg2, not asyncpg
sqlalchemy.url = postgresql://user:password@localhost:5432/knowledge_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
